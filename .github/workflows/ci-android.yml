name: CI · Android (Kotlin lint)

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'app/**'
      - '.github/workflows/ci-android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - 'app/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ktlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Download ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.3.1/ktlint
          chmod +x ktlint

      - name: ktlint check (informational)
        run: ./ktlint "app/**/*.kt" "android/**/*.kt" --reporter=plain --relative
        continue-on-error: true   # style signal only; non-blocking for M0

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Run app unit tests
        run: gradle :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Upload test reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/
