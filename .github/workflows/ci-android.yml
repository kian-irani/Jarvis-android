name: CI · Android (Kotlin lint)

on:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'app/**'
      - '.github/workflows/ci-android.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - 'app/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ktlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download ktlint
        run: |
          curl -sSLO https://github.com/pinterest/ktlint/releases/download/1.3.1/ktlint
          chmod +x ktlint

      - name: ktlint check (informational)
        run: ./ktlint "app/**/*.kt" "android/**/*.kt" --reporter=plain --relative
        continue-on-error: true   # style signal only; non-blocking for M0
