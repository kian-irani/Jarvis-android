name: Build Vision APK (internal artifact only)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - 'app/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # برای دسترسی به همه tag ها

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            /opt/gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install Gradle and build
        run: |
          if [ ! -d "/opt/gradle/gradle-8.11.1" ]; then
            wget -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -O /tmp/gradle.zip
            sudo unzip -q /tmp/gradle.zip -d /opt/gradle
          fi
          export PATH="/opt/gradle/gradle-8.11.1/bin:$PATH"
          gradle wrapper --gradle-version=8.11.1 --distribution-type=bin
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Get APK size
        id: apk_info
        run: |
          APK_PATH=$(ls app/build/outputs/apk/debug/*.apk | head -1)
          SIZE_KB=$(du -k "$APK_PATH" | awk '{print $1}')
          SIZE_MB=$(echo "scale=2; $SIZE_KB/1024" | bc)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_size=${SIZE_MB}MB" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JARVIS-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # NOTE: Public GitHub Releases disabled for Vision Agent OS (source-available, activation-gated).
      # Distribution happens via the official kiancdn bot, not public APK downloads.
      # Build output stays as a private Actions artifact only (above).
