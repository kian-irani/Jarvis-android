name: Build JARVIS APK
on:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Install Gradle and build
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          export PATH="/opt/gradle/gradle-8.11.1/bin:$PATH"
          gradle wrapper --gradle-version=8.11.1 --distribution-type=bin
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
      - uses: actions/upload-artifact@v4
        with:
          name: JARVIS-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.1.${{ github.run_number }}
          name: "JARVIS v4.1.${{ github.run_number }}"
          files: app/build/outputs/apk/debug/*.apk
          body: "JARVIS Android - Brain: http://212.87.199.62:8000"
          token: ${{ secrets.GITHUB_TOKEN }}
