name: Build Vision APK (internal artifact only)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'android/**'
      - 'app/**'
      - 'gradle/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - '.github/workflows/build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'android/**'
      - 'app/**'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # برای دسترسی به همه tag ها

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            /opt/gradle
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install Gradle and build
        run: |
          if [ ! -d "/opt/gradle/gradle-8.11.1" ]; then
            wget -q https://services.gradle.org/distributions/gradle-8.11.1-bin.zip -O /tmp/gradle.zip
            sudo unzip -q /tmp/gradle.zip -d /opt/gradle
          fi
          export PATH="/opt/gradle/gradle-8.11.1/bin:$PATH"
          gradle wrapper --gradle-version=8.11.1 --distribution-type=bin
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Get APK size
        id: apk_info
        run: |
          APK_PATH=$(ls app/build/outputs/apk/debug/*.apk | head -1)
          SIZE_KB=$(du -k "$APK_PATH" | awk '{print $1}')
          SIZE_MB=$(echo "scale=2; $SIZE_KB/1024" | bc)
          echo "apk_path=$APK_PATH" >> $GITHUB_OUTPUT
          echo "apk_size=${SIZE_MB}MB" >> $GITHUB_OUTPUT
          echo "build_date=$(date -u +%Y-%m-%d)" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: VISION-debug-${{ github.run_number }}
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # Public rolling release (user order 2026-06-12: APK must be downloadable on GitHub).
      - name: Publish rolling release
        if: github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK="${{ steps.apk_info.outputs.apk_path }}"
          cp "$APK" VISION-v16-debug.apk
          gh release delete v16-latest --yes 2>/dev/null || true
          git push --delete origin v16-latest 2>/dev/null || true
          gh release create v16-latest VISION-v16-debug.apk \
            --title "VISION v16 — latest build (${{ steps.apk_info.outputs.build_date }})" \
            --notes "Auto-built from \`${{ github.sha }}\` · size ${{ steps.apk_info.outputs.apk_size }} · run #${{ github.run_number }}. Activation via kiancdn bot." \
            --latest
